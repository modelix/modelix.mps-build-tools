name: Build

on:
  push:
    branches:
      - '**'

jobs:
  build-and-test-with-mps:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        mpsversion: [ "2020.3.6", "2021.1.4", "2021.2.6", "2021.3.5", "2022.2.4", "2022.3.3", "2023.2.2", "2023.3.2", "2024.1.1", "2024.3", "2025.1.1", "2025.2.1" ]
        javaversion: [ 21 ]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up JDK
        uses: actions/setup-java@17f84c3641ba7b8f6deff6309fc4c864478f5d62 # v3
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.javaversion }}
      - name: Set up Gradle
        uses: gradle/gradle-build-action@a8f75513eafdebd8141bd1cd4e30fcd194af8dfa # v2
      - name: Assemble
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew build publishToMavenLocal -PciBuild=true
      - name: Test with ${{ matrix.version }}
        run: cd build-tools-gradle-test && ./gradlew --build-cache build publishToMavenLocal -Pmps.version=${{ matrix.mpsversion }}
